/* ============================================================================

 * ==========================================================================*/
:root{
  --bg:#0e1016;

  --energy-fill:#15291a;
  --power:#ffb13d; --power-d:#e0902a; --power-fill:#2a2412;
  --player:#8b7bff; --player-d:#6a57f0; --player-fill:#211d3a;
  --flame:#ff6a3d; --flame-fill:#2a1612;
  --water:#39a9d4; --water-fill:#10242c;
  --banana:#ffd23f;
  --radius:18px; --radius-sm:13px; --radius-lg:24px; --radius-pill:999px;
  --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:22px; --s6:30px; --s7:44px;
  --t-xs:12px; --t-sm:13px; --t-md:15px; --t-lg:17px; --t-xl:21px; --t-2xl:27px; --t-3xl:36px; --t-4xl:46px;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;
  --shadow:0 2px 4px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35);
  --shadow-up:0 12px 40px rgba(0,0,0,.5);
  --tap:46px;
  color-scheme:dark;
}
@media (prefers-color-scheme:light){
  :root{
    --bg:#f1efe6;
    --bg-glow1:#fff6cf; --bg-glow2:#e4f3dc;
    --panel:#ffffff; --panel-2:#faf8f0; --panel-3:#f1eee2;
    --line:#e6e2d4; --line-2:#d4cfbd;
    --ink:#1b1a16; --mut:#6c6a60; --faint:#9a988c;
    --energy:#3f9a23; --energy-d:#2f7d16; --energy-weak:#e7f3df; --energy-glow:rgba(63,154,35,.35);
    --energy-fill:#e2f1d8;
    --power:#cf850c; --power-d:#a86a06; --power-fill:#f8efd9;
    --player:#6a57f0; --player-d:#5340d4; --player-fill:#ece9fd;
    --flame:#dd4f1c; --flame-fill:#fbe7dd;
    --water:#1f86ab; --water-fill:#dff0f6;
    --banana:#e7ad00;
    --shadow:0 1px 2px rgba(40,36,20,.06),0 6px 18px rgba(40,36,20,.07);
    --shadow-up:0 14px 40px rgba(40,36,20,.16);
    color-scheme:light;
  }
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0;font-family:var(--sans);font-size:var(--t-md);line-height:1.5;
  color:var(--ink);background:var(--bg);
  background-image:radial-gradient(900px 540px at 15% -8%,var(--bg-glow1) 0,transparent 60%),
                   radial-gradient(820px 520px at 112% 4%,var(--bg-glow2) 0,transparent 55%);
  background-attachment:fixed;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4,p{margin:0}
button{font:inherit;color:inherit;cursor:pointer}
input,select,button{font-family:inherit}
.num{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.row{display:flex;align-items:center;gap:var(--s2)}
.spacer{margin-left:auto}
.app{max-width:520px;margin:0 auto;min-height:100vh;position:relative;display:flex;flex-direction:column}
.screen{flex:1;padding:var(--s4) var(--s4) calc(96px + env(safe-area-inset-bottom))}
.section-title{font-size:var(--t-xs);font-weight:900;letter-spacing:.16em;text-transform:uppercase;color:var(--mut);margin:var(--s5) var(--s2) var(--s3);display:flex;align-items:center;gap:8px}

.hud__brand{display:flex;align-items:center;gap:8px;font-weight:900;letter-spacing:-.01em}
.hud__brand .mk{font-size:20px;line-height:1}
.hud__brand .nm{font-size:var(--t-md)}
.hud__brand .nm small{display:block;font-size:9px;font-weight:800;letter-spacing:.18em;color:var(--player);text-transform:uppercase;line-height:1;margin-top:2px}

.hud-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:var(--radius-pill);font-size:var(--t-sm);font-weight:900;border:1px solid var(--line);background:var(--panel)}
.hud-chip .num{font-size:var(--t-sm)}
.hud-chip--streak{background:var(--flame-fill);border-color:color-mix(in srgb,var(--flame) 40%,transparent);color:var(--flame)}

.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:40;display:flex;justify-content:center;gap:2px;padding:8px max(12px,env(safe-area-inset-left)) calc(8px + env(safe-area-inset-bottom));background:color-mix(in srgb,var(--panel) 92%,transparent);-webkit-backdrop-filter:saturate(1.6) blur(18px);backdrop-filter:saturate(1.6) blur(18px);border-top:1px solid var(--line)}
.tabbar__inner{display:flex;gap:2px;width:100%;max-width:520px}

.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.panel+.panel{margin-top:var(--s3)}
.panel__pad{padding:var(--s4)}

.panel__foot{display:flex;align-items:center;gap:var(--s2);padding:var(--s3) var(--s4);border-top:1px solid var(--line);background:var(--panel-2);border-radius:0 0 var(--radius) var(--radius)}
.mascot{position:relative;text-align:center;overflow:hidden;border-radius:var(--radius-lg);padding:var(--s5) var(--s4) var(--s4);background:radial-gradient(130% 90% at 50% -10%,color-mix(in srgb,var(--energy) 22%,var(--panel)) 0,var(--panel) 62%);border:1px solid color-mix(in srgb,var(--energy) 35%,var(--line));box-shadow:var(--shadow),0 0 0 1px color-mix(in srgb,var(--energy) 12%,transparent)}
.mascot.is-warn{background:radial-gradient(130% 90% at 50% -10%,color-mix(in srgb,var(--power) 22%,var(--panel)) 0,var(--panel) 62%);border-color:color-mix(in srgb,var(--power) 35%,var(--line))}
.mascot__speech{display:inline-block;background:var(--ink);color:var(--bg);font-size:var(--t-sm);font-weight:900;padding:6px 13px;border-radius:14px;position:relative;margin-bottom:var(--s2);box-shadow:var(--shadow)}
.mascot__speech:after{content:"";position:absolute;left:50%;bottom:-6px;transform:translateX(-50%) rotate(45deg);width:11px;height:11px;background:var(--ink);border-radius:2px}

.fuelbar{position:relative;height:34px;border-radius:var(--radius-pill);background:var(--energy-fill);border:1px solid color-mix(in srgb,var(--energy) 30%,var(--line));overflow:hidden;margin:var(--s4) var(--s2) 0}

.feedbtn{appearance:none;-webkit-appearance:none;flex:0 0 auto;width:var(--tap);height:var(--tap);border-radius:14px;border:2px solid var(--line-2);background:var(--panel-2);display:grid;place-content:center;position:relative;font-size:11px;font-weight:900;letter-spacing:.04em;color:var(--mut);text-transform:uppercase;transition:background .15s,border-color .15s,transform .06s}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:var(--s2);min-height:var(--tap);padding:0 var(--s4);border-radius:14px;border:1px solid var(--line-2);background:var(--panel-2);color:var(--ink);font-size:var(--t-md);font-weight:800;text-decoration:none;transition:background .15s,border-color .15s,transform .05s}

<script>
"use strict";
/* ============================================================================
 * NANA — GAIN QUEST · app logic (vanilla, single-file, localStorage-only)

 * ==========================================================================*/

/* ---- SEED DATA (canonical, from design/seed-data.js) --------------------- */
const SEED_INGREDIENTS = {

  gouda:       { name:"Gouda/Emmentaler",     unit:"g",    kcalPer:3.56, proteinPer:0.25,  pricePer:0.00853, pack:150,  packPrice:1.28, packLabel:"150 g",      group:"fresh" },
  bread:       { name:"Wholegrain bread",     unit:"slice",kcalPer:80,   proteinPer:4,     pricePer:0.07,    pack:20,   packPrice:1.40, packLabel:"loaf ≈20 sl",group:"fresh" },

  orange:      { name:"Orange",               unit:"each", kcalPer:62,   proteinPer:1.2,   pricePer:0.30,    pack:1,    packPrice:0.30, packLabel:"each",       group:"fresh" },
  redPepper:   { name:"Red pepper",           unit:"each", kcalPer:37,   proteinPer:1.2,   pricePer:0.60,    pack:1,    packPrice:0.60, packLabel:"each",       group:"fresh" },
  cherryTom:   { name:"Cherry tomatoes",      unit:"g",    kcalPer:0.18, proteinPer:0.009, pricePer:0.006,   pack:250,  packPrice:1.50, packLabel:"250 g",      group:"fresh" },
  tuna:        { name:"Canned tuna",          unit:"can",  kcalPer:191,  proteinPer:42,    pricePer:0.90,    pack:1,    packPrice:0.90, packLabel:"can",        group:"fresh" },
  kidneyBeans: { name:"Kidney beans",         unit:"can",  kcalPer:215,  proteinPer:14,    pricePer:0.90,    pack:1,    packPrice:0.90, packLabel:"can",        group:"fresh" },
  oliveOil:    { name:"Olive oil (extra)",    unit:"tbsp", kcalPer:120,  proteinPer:0,     pricePer:0.10,    pack:750,  packPrice:5.00, packLabel:"750 ml",     group:"pantry" },

const SEED_RECIPES = {
  S1:   { name:"Peanut-Banana",     kind:"shake", emoji:"🥤", items:[["milk",500],["oats",80],["banana",1],["peanutButter",30],["honey",1],["flaxseed",1]] },
  S2:   { name:"Blueberry-Walnut",  kind:"shake", emoji:"🥤", items:[["milk",500],["oats",60],["blueberries",100],["peanutButter",30],["walnuts",25],["honey",1]] },
  S3:   { name:"Cocoa-Banana",      kind:"shake", emoji:"🥤", items:[["milk",500],["oats",70],["banana",1],["peanutButter",25],["cocoa",1],["honey",1],["almonds",15]] },
  S4:   { name:"Berry-Yogurt",      kind:"shake", emoji:"🥤", items:[["milk",300],["greekYogurt",150],["oats",60],["mixedBerries",100],["peanutButter",25],["honey",1],["flaxseed",1]] },
  A_mid:{ name:"Avocado-Cheese bread",  kind:"solid", emoji:"🥪", items:[["bread",2],["avocado",0.5],["gouda",50],["redPepper",1]] },
  A_aft:{ name:"Yogurt, walnuts & kiwi",kind:"solid", emoji:"🥣", items:[["greekYogurt",200],["honey",1],["walnuts",20],["kiwi",1]] },
  B_mid:{ name:"Tuna-bean salad",       kind:"solid", emoji:"🥗", items:[["tuna",1],["kidneyBeans",1],["oliveOil",1],["avocado",0.5]] },
  B_aft:{ name:"PB bread, banana & orange",kind:"solid", emoji:"🍞", items:[["bread",1],["peanutButter",20],["banana",1],["orange",1]] },
  C_mid:{ name:"Cheese-honey bread",    kind:"solid", emoji:"🧀", items:[["bread",3],["gouda",60],["avocado",0.5],["cherryTom",100]] },
  C_aft:{ name:"Yogurt, almonds & orange",kind:"solid", emoji:"🥣", items:[["greekYogurt",150],["honey",1],["almonds",25],["orange",1]] },
};
const SEED_ROTATION = [
  { morning:"S1", midday:"A_mid", afternoon:"A_aft", evening:"S2" },
  { morning:"S3", midday:"B_mid", afternoon:"B_aft", evening:"S1" },
  { morning:"S2", midday:"C_mid", afternoon:"C_aft", evening:"S4" },
  { morning:"S1", midday:"A_mid", afternoon:"A_aft", evening:"S3" },
  { morning:"S4", midday:"B_mid", afternoon:"B_aft", evening:"S2" },
  { morning:"S2", midday:"C_mid", afternoon:"C_aft", evening:"S1" },
];
const SEED_SETTINGS = {
  startDate:"2026-06-29", planDays:30,
  waterPerDayL:2, waterPricePerL:0.66,
  kcalTarget:[3000,3200], proteinTarget:110, budgetCap:270,
  shoppingByPack:true,
};
const SLOTS = ["morning","midday","afternoon","evening"];
const SLOT_META = {
  morning:  { icon:"🌅", time:"Morn" },
  midday:   { icon:"☀️", time:"Mid" },
  afternoon:{ icon:"🌤️", time:"Aft" },
  evening:  { icon:"🌙", time:"Eve" },
};
const CYCLE_TAGS = { 1:"🫙 full pantry stock-up", 5:"🫙 pantry top-up", 10:"🏆 final boss" };
const XP_PER_MEAL = 25, XP_BOSS_BONUS = 100;

/* ---- STORE --------------------------------------------------------------- */
const LS_KEY = "mwg.v1";
const SCHEMA_VERSION = 3;

function freshState(){
  return {
    version: SCHEMA_VERSION,
    ingredients: structuredClone(SEED_INGREDIENTS),
    recipes: structuredClone(SEED_RECIPES),
    rotation: structuredClone(SEED_ROTATION),
    settings: structuredClone(SEED_SETTINGS),
    checks: { meals:{}, cycles:{}, pantry:{ start:false, mid:false } },
    water: {},
    stock: {},
    game: { xp:0 },
  };
}
function migrate(s){
  if(!s || typeof s!=="object") return freshState();
  if(!s.water) s.water = {};
  if(!s.stock) s.stock = {};
  if(!s.game) s.game = { xp:0 };
  if(!s.checks) s.checks = { meals:{}, cycles:{}, pantry:{ start:false, mid:false } };
  if(!s.checks.meals) s.checks.meals = {};
  if(!s.checks.cycles) s.checks.cycles = {};
  if(!s.checks.pantry) s.checks.pantry = { start:false, mid:false };
  s.version = SCHEMA_VERSION;
  return s;
}
let state = load();
function load(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return freshState();
    const parsed = migrate(JSON.parse(raw));
    parsed.game.xp = totalXp(parsed);      // reconcile XP from history (idempotent)
    return parsed;
  }catch(e){ return freshState(); }
}
function persist(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){}
}
function setState(fn){
  fn(state);
  state.game.xp = totalXp(state);          // keep XP in sync with checks
  persist();
  render();
}
function resetState(){ state = freshState(); persist(); render(); }

/* ---- DATE HELPERS -------------------------------------------------------- */
function todayISO(){ return toISO(new Date()); }
function toISO(d){
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function parseISO(s){ const [y,m,d]=s.split("-").map(Number); return new Date(Date.UTC(y,m-1,d)); }
function daysBetween(aISO,bISO){ return Math.round((parseISO(bISO)-parseISO(aISO))/86400000); }
function addDaysISO(iso,n){ const d=parseISO(iso); d.setUTCDate(d.getUTCDate()+n); return toISO(d); }
function fmtDate(iso){
  const d=parseISO(iso);
  return d.toLocaleDateString(undefined,{weekday:"short",day:"numeric",month:"short",timeZone:"UTC"});
}

/* ---- FORMATTERS ---------------------------------------------------------- */
const eurFmt = new Intl.NumberFormat("de-DE",{style:"currency",currency:"EUR"});
function fmtEUR(n){ return eurFmt.format(n||0); }
function fmtNum(n){ return new Intl.NumberFormat("en-US").format(Math.round(n||0)); }
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

/* ---- COMPUTE: nutrition & cost ------------------------------------------- */
function ing(key){ return state.ingredients[key]; }
const MISSING_RECIPE={ name:"(empty slot)", kind:"shake", emoji:"⬚", items:[] };
function recipeOr(rk){ return state.recipes[rk]||MISSING_RECIPE; }
function defaultDay(s){ const k=Object.keys(s.recipes)[0]; return { morning:k, midday:k, afternoon:k, evening:k }; }
function recipeStats(rk){
  const r = state.recipes[rk];
  let kcal=0, protein=0, cost=0;
  if(r) for(const [k,q] of r.items){
    const g = ing(k); if(!g) continue;
    kcal += q*g.kcalPer; protein += q*g.proteinPer; cost += q*g.pricePer;
  }
  return { kcal, protein, cost };
}
function itemStats(k,q){ const g=ing(k); return g?{kcal:q*g.kcalPer,cost:q*g.pricePer}:{kcal:0,cost:0}; }
function ingList(rk){
  const r = state.recipes[rk]; if(!r) return "";
  return r.items.map(([k,q])=>{ const g=ing(k); if(!g) return ""; return prettyAmt(q,g.unit)+" "+shortName(g.name); }).filter(Boolean).join(" · ");
}
function shortName(n){ return n.replace(/ \(.*\)$/,"").replace("Whole milk 3.5%","milk").replace("Peanut butter","PB"); }
function prettyAmt(q,unit){
  if(unit==="each") return q===0.5?"½":String(q);
  if(unit==="slice") return q+" sl";
  if(unit==="can") return q+" can";
  if(unit==="tbsp") return q+" tbsp";
  return q+" "+unit;
}
function rotationDayFor(iso){
  const n = daysBetween(state.settings.startDate, iso);
  const len = state.rotation.length;
  return ((n % len)+len)%len; // 0..len-1
}
function mealsForDate(iso){ return state.rotation[rotationDayFor(iso)]; }
function dayStats(iso){
  const day = mealsForDate(iso);
  let kcal=0,protein=0,cost=0;
  for(const slot of SLOTS){ const s=recipeStats(day[slot]); kcal+=s.kcal; protein+=s.protein; cost+=s.cost; }
  const [kmin,kmax]=state.settings.kcalTarget;
  return { kcal, protein, cost,
    kcalInTarget: kcal>=kmin && kcal<=kmax,
    proteinInTarget: protein>=state.settings.proteinTarget };
}

/* ---- COMPUTE: gamification (all derived; only xp stored) ----------------- */
function fedMeals(iso, st){ const m=(st||state).checks.meals[iso]; if(!m) return 0; return SLOTS.reduce((a,s)=>a+(m[s]?1:0),0); }
function isFed(iso,slot){ const m=state.checks.meals[iso]; return !!(m&&m[slot]); }
function xpForDate(iso, st){ const fed=fedMeals(iso,st); return fed*XP_PER_MEAL + (fed===4?XP_BOSS_BONUS:0); }
function totalXp(st){ return Object.keys(st.checks.meals).reduce((a,iso)=>a+xpForDate(iso,st),0); }
function level(xp){ return Math.floor(Math.sqrt(xp/50))+1; }
function xpIntoLevel(xp){ const l=level(xp); const base=50*(l-1)*(l-1); return { into:xp-base, span:50*(l*l-(l-1)*(l-1)) }; }
function bossWins(st){ return Object.keys((st||state).checks.meals).filter(iso=>fedMeals(iso,st)===4).length; }
function streak(){
  // consecutive fully-fed days ending yesterday-or-today; today counts if fully fed
  let s=0, cur=todayISO();
  if(fedMeals(cur)<4) cur=addDaysISO(cur,-1);
  while(fedMeals(cur)===4){ s++; cur=addDaysISO(cur,-1); }
  return s;
}
function daysComplete(){
  const {startDate,planDays}=state.settings;
  let c=0;
  for(let i=0;i<planDays;i++){ if(fedMeals(addDaysISO(startDate,i))===4) c++; }
  return c;
}
function currentCycle(iso){ const n=daysBetween(state.settings.startDate,iso); if(n<0) return null; return Math.floor(n/3)+1; }
function rarity(kcal){ return kcal>=1000?{s:"★★★ epic fuel",cls:"pill--player"}:kcal>=600?{s:"★★ rare",cls:"pill--power"}:{s:"★ common",cls:"pill--ghost"}; }

/* ---- COMPUTE: water ------------------------------------------------------ */
function waterLoggedFor(iso){ return state.water[iso]||0; }
function logWater(iso,liters){ setState(s=>{ if(liters<=0) delete s.water[iso]; else s.water[iso]=liters; }); }

/* ---- COMPUTE: shopping --------------------------------------------------- */
function accumulate(fromISO,toISO){
  const totals={}; const days=daysBetween(fromISO,toISO)+1;
  for(let i=0;i<days;i++){
    const iso=addDaysISO(fromISO,i); const day=mealsForDate(iso);
    for(const slot of SLOTS){ const r=state.recipes[day[slot]]; if(!r) continue;
      for(const [k,q] of r.items){ totals[k]=(totals[k]||0)+q; } }
  }
  return { totals, days };
}
function stockOf(k){ return (state.stock&&state.stock[k])||0; }
function lineFor(k,total,byPack){
  const g=ing(k);
  const stock=stockOf(k);
  const toBuy=Math.max(0,total-stock);
  const packs=Math.ceil(toBuy/g.pack);
  const cost = byPack ? packs*g.packPrice : toBuy*g.pricePer;
  const packStr = packs===0 ? "✓ in stock"
                : g.pack===1 ? packs+(g.unit==="each"?" ea":g.unit==="can"?"":" "+g.unit)
                : (g.name==="Wholegrain bread"? packs+(packs>1?" loaves":" loaf") : packs+" × "+g.packLabel);
  return { key:k, name:g.name, total, stock, toBuy, unit:g.unit, packs, packLabel:g.packLabel, packStr, cost, group:g.group };
}
function shoppingList(fromISO,toISO){
  const byPack=state.settings.shoppingByPack;
  const { totals, days }=accumulate(fromISO,toISO);
  const fresh=[], pantry=[];
  for(const k of Object.keys(totals)){
    const line=lineFor(k,totals[k],byPack);
    (line.group==="fresh"?fresh:pantry).push(line);
  }
  fresh.sort((a,b)=>b.cost-a.cost); pantry.sort((a,b)=>b.cost-a.cost);
  const liters=days*state.settings.waterPerDayL;
  const water={ liters, cost:liters*state.settings.waterPricePerL };
  const total=[...fresh,...pantry].reduce((a,l)=>a+l.cost,0)+water.cost;
  return { fresh, pantry, water, total, days };
}
function monthlyBudget(){
  // fresh = sum of 10 per-3-day runs (each pack-rounded); pantry = whole-month once; water = month.
  const {startDate,planDays,budgetCap}=state.settings;
  const byPack=state.settings.shoppingByPack;
  let freshCost=0;
  const runs=Math.ceil(planDays/3);
  for(let r=0;r<runs;r++){
    const f=addDaysISO(startDate,r*3), t=addDaysISO(startDate,Math.min(r*3+2,planDays-1));
    const {totals}=accumulate(f,t);
    for(const k of Object.keys(totals)){ if(ing(k).group==="fresh"){ freshCost+=lineFor(k,totals[k],byPack).cost; } }
  }
  const monthEnd=addDaysISO(startDate,planDays-1);
  const {totals}=accumulate(startDate,monthEnd);
  let pantryCost=0;
  for(const k of Object.keys(totals)){ if(ing(k).group==="pantry"){ pantryCost+=lineFor(k,totals[k],byPack).cost; } }
  const waterCost=planDays*state.settings.waterPerDayL*state.settings.waterPricePerL;
  const total=freshCost+pantryCost+waterCost;
  return { fresh:freshCost, pantry:pantryCost, water:waterCost, total, cap:budgetCap, buffer:budgetCap-total };
}

    <div class="loot-list">${lootRows(list.pantry)||'<div class="loot"><div class="loot__body"><div class="loot__need">nothing</div></div></div>'}</div>
    <div class="loot-head loot-head--water"><span class="ic">💧</span><div><div class="nm">Water</div><div class="sub">${list.water.liters} L @ ${fmtEUR(state.settings.waterPricePerL)}/L</div></div><span class="price">${fmtEUR(list.water.cost)}</span></div>
    <div style="height:var(--s3)"></div>
    <div class="treasury">
      <div class="treasury__row">🛒 Fresh ${fmtEUR(freshTotal)} · 🫙 Pantry ${fmtEUR(pantryTotal)} · 💧 Water ${fmtEUR(list.water.cost)}</div>
      <div class="treasury__grand"><span style="font-weight:800">Total</span><b class="spacer" style="margin-left:auto">${fmtEUR(list.total)}</b></div>
      <div class="row" style="margin-top:var(--s2)"><span class="hint">budget cap ${fmtEUR(state.settings.budgetCap)}</span>${budgetPill(state.settings.budgetCap-list.total)}</div>
    </div>`
  );
}
function budgetPill(buffer){
  return buffer>=0
    ? `<span class="pill pill--energy spacer">🏆 ${fmtEUR(buffer)} buffer left</span>`
    : `<span class="pill pill--power spacer">⚠ ${fmtEUR(-buffer)} over cap</span>`;
}

/* ---- QUEST (tracker) ----------------------------------------------------- */
function viewTracker(){
  const b=monthlyBudget();
  const dc=daysComplete();
  const xp=state.game.xp;
  const stops=[];
  for(let c=1;c<=10;c++){
    const from=(c-1)*3+1, to=Math.min(c*3,state.settings.planDays);
    const done=!!state.checks.cycles[c];
    const tag=CYCLE_TAGS[c];
    const finalBoss=c===10;
    stops.push(`<div class="qstop ${done?'is-done':''}">
      <div class="qstop__rail"><div class="qstop__node">${finalBoss?'🏆':c}</div><div class="qstop__line"></div></div>
      <div class="qstop__body"><div class="row"><div style="flex:1">
        <div class="qstop__title">Cycle ${c} · days ${from}–${to}</div>
        ${tag?`<span class="qstop__tag" ${finalBoss?'style="background:var(--flame-fill);color:var(--flame);border-color:color-mix(in srgb,var(--flame) 35%,transparent)"':''}>${tag}</span>`:'<div class="qstop__sub">🛒 fresh run</div>'}
      </div><input class="feedbtn feedbtn--sm qstop__check" type="checkbox" ${done?'checked':''} aria-label="Cycle ${c} done" data-cycle="${c}"></div></div>
    </div>`);
  }
  const dcPct=Math.round(dc/state.settings.planDays*100);
  return screen("tracker",
    `<section class="mascot">
      <div class="mascot__speech">${dc>0?`${dc} of ${state.settings.planDays} days cleared! 💪`:`Feed Nana to start the quest 🍌`}</div>
      <div class="mascot__buddy">🏁</div>
      <div class="fuelbar"><div class="fuelbar__fill" style="width:${dcPct}%"></div><div class="fuelbar__label">${dc} / ${state.settings.planDays} days complete</div></div>
      <div class="pills">
        <span class="pill pill--player">✦ Level ${level(xp)}</span>
        <span class="pill pill--flame">🔥 ${streak()}-day streak</span>
        <span class="pill pill--energy">🏆 ${bossWins()} boss wins</span>
      </div>
    </section>
    <div class="section-title">Quest map · 10 cycles<span class="spacer">3 days each</span></div>
    <div class="panel"><div class="panel__pad"><div class="qpath">${stops.join("")}</div></div></div>
    <div class="section-title">Treasury</div>
    <div class="treasury">
      <div class="treasury__row">🛒 Fresh ${fmtEUR(b.fresh)} · 🫙 Pantry ${fmtEUR(b.pantry)} · 💧 Water ${fmtEUR(b.water)}</div>
      <hr class="divider">
      <div class="treasury__grand"><span style="font-weight:800">Spent plan</span><b class="spacer" style="margin-left:auto">${fmtEUR(b.total)}</b></div>
      <div class="row" style="margin-top:var(--s2)"><span class="hint">budget cap ${fmtEUR(b.cap)}</span>${budgetPill(b.buffer)}</div>
    </div>`
  );
}

      <div class="field"><label class="field__label" for="s_kmax">🔥 kcal max</label><input class="input num" id="s_kmax" value="${s.kcalTarget[1]}" inputmode="numeric" data-set="kcalMax"></div>
      <div class="field field--wide"><label class="field__label" for="s_prot">⚡ Protein min · g/day</label><input class="input num" id="s_prot" value="${s.proteinTarget}" inputmode="numeric" data-set="proteinTarget"></div>
    </div>
    <div class="pills" style="justify-content:flex-start;margin-top:var(--s4)">

      <span class="pill pill--power">⚡ ≥ ${s.proteinTarget} g</span>

    </div></div>

    <div class="info"><h3>Small appetite, calorie-dense by design</h3><ul>
      <li>Two shakes carry most of the day's fuel — easy to drink when appetite is low.</li>
      <li>Two solid snacks add ⚡ protein & variety midday and afternoon.</li>
      <li>A 6-day journey repeats 5× so the supply run stays predictable and cheap.</li>
      <li>Feed all 4 meals to defeat the daily boss (+${XP_BOSS_BONUS} XP) and grow your 🔥 streak.</li>

/* ============================================================================
 * ROUTER + EVENT WIRING
 * ==========================================================================*/
const VIEWS = { today:viewToday, rotation:viewRotation, recipes:viewRecipes, shopping:viewShopping, tracker:viewTracker, settings:viewSettings };
function currentRoute(){ const h=location.hash.replace("#",""); return VIEWS[h]?h:"today"; }
function render(){
  const route=currentRoute();
  document.getElementById("app").innerHTML = VIEWS[route]();
  wire(route);
}
function num(v,fallback){ const n=parseFloat(v); return isNaN(n)?fallback:Math.max(0,n); }

function wire(route){
  const app=document.getElementById("app");

  if(route==="today"){
    app.querySelectorAll("[data-feed]").forEach(el=>el.addEventListener("change",e=>{
      const slot=e.target.dataset.feed, iso=viewDate;
      setState(s=>{ s.checks.meals[iso]=s.checks.meals[iso]||{}; s.checks.meals[iso][slot]=e.target.checked; });
    }));
    app.querySelectorAll("[data-water]").forEach(el=>el.addEventListener("click",e=>{
      const v=parseFloat(e.target.dataset.water);
      logWater(viewDate, waterLoggedFor(viewDate)===v?0:v);
    }));
    const jd=app.querySelector("#jumpDate");
    if(jd) jd.addEventListener("change",e=>{ viewDate=e.target.value||todayISO(); render(); });
    const jt=app.querySelector("#jumpToday");
    if(jt) jt.addEventListener("click",()=>{ viewDate=todayISO(); render(); });
  }

  if(route==="rotation"){
    app.querySelectorAll(".slot-select").forEach(el=>el.addEventListener("change",e=>{
      const {day,slot}=e.target.dataset;
      setState(s=>{ s.rotation[+day][slot]=e.target.value; });
    }));
    app.querySelector("#addDay")?.addEventListener("click",()=>{
      setState(s=>{ const last=s.rotation[s.rotation.length-1]; s.rotation.push(last?{...last}:defaultDay(s)); });
    });
    app.querySelectorAll("[data-delday]").forEach(el=>el.addEventListener("click",e=>{
      const i=+e.target.dataset.delday;
      if(state.rotation.length<=1){ alert("The loop needs at least one day."); return; }
      if(confirm(`Remove Day ${i+1} from the loop? The loop becomes ${state.rotation.length-1} days.`))
        setState(s=>{ s.rotation.splice(i,1); });
    }));
  }

  if(route==="recipes"){
    app.querySelectorAll("[data-field='amount']").forEach(el=>el.addEventListener("change",e=>{
      const {recipe,idx}=e.target.dataset;
      setState(s=>{ s.recipes[recipe].items[+idx][1]=num(e.target.value,0); });
    }));
    app.querySelectorAll("[data-field='ingredient']").forEach(el=>el.addEventListener("change",e=>{
      const {recipe,idx}=e.target.dataset;
      setState(s=>{ s.recipes[recipe].items[+idx][0]=e.target.value; });
    }));
    app.querySelectorAll("[data-field='remove']").forEach(el=>el.addEventListener("click",e=>{
      const {recipe,idx}=e.target.dataset;
      setState(s=>{ s.recipes[recipe].items.splice(+idx,1); });
    }));
    app.querySelectorAll("[data-field='add']").forEach(el=>el.addEventListener("click",e=>{
      const {recipe}=e.target.dataset; const firstIng=Object.keys(state.ingredients)[0];
      setState(s=>{ s.recipes[recipe].items.push([firstIng,1]); });
    }));
    app.querySelectorAll("[data-field='rename']").forEach(el=>el.addEventListener("change",e=>{
      const {recipe}=e.target.dataset; const v=e.target.value.trim()||state.recipes[recipe].name;
      setState(s=>{ s.recipes[recipe].name=v; });
    }));
    app.querySelectorAll("[data-field='delRecipe']").forEach(el=>el.addEventListener("click",e=>{
      const {recipe}=e.target.dataset;
      const used=state.rotation.some(d=>SLOTS.some(sl=>d[sl]===recipe));
      const msg=used?`"${state.recipes[recipe].name}" is used in the rotation — delete it anyway? Those slots will show as empty until reassigned.`:`Delete "${state.recipes[recipe].name}"?`;
      if(confirm(msg)) setState(s=>{ delete s.recipes[recipe]; });
    }));
    app.querySelector("#newRecipe")?.addEventListener("click",()=>{
      const key="R"+Date.now().toString(36);
      const firstIng=Object.keys(state.ingredients)[0];
      setState(s=>{ s.recipes[key]={name:"New recipe",kind:"shake",emoji:"🍽️",items:[[firstIng,1]]}; });
    });
    // codex: numeric cells, name (string), group toggle, delete
    app.querySelectorAll(".cell-input[data-field='name']").forEach(el=>el.addEventListener("change",e=>{
      const {ing:k}=e.target.dataset; const v=e.target.value.trim()||state.ingredients[k].name;
      setState(s=>{ s.ingredients[k].name=v; });
    }));
    app.querySelectorAll(".cell-input:not([data-field='name'])").forEach(el=>el.addEventListener("change",e=>{
      const {ing:k,field}=e.target.dataset;
      setState(s=>{ s.ingredients[k][field]=num(e.target.value,0); });
    }));
    app.querySelectorAll("[data-field='group']").forEach(el=>el.addEventListener("click",e=>{
      const {ing:k}=e.target.dataset;
      setState(s=>{ s.ingredients[k].group = s.ingredients[k].group==="fresh"?"pantry":"fresh"; });
    }));
    app.querySelectorAll("[data-field='delIng']").forEach(el=>el.addEventListener("click",e=>{
      const {ing:k}=e.target.dataset;
      const usedBy=Object.values(state.recipes).filter(r=>r.items.some(([ik])=>ik===k)).map(r=>r.name);
      if(usedBy.length){ alert(`Can't delete "${state.ingredients[k].name}" — still used by: ${usedBy.join(", ")}. Remove it from those recipes first.`); return; }
      if(confirm(`Delete ingredient "${state.ingredients[k].name}"?`)) setState(s=>{ delete s.ingredients[k]; });
    }));
    app.querySelector("#newIngredient")?.addEventListener("click",()=>{
      const key="i"+Date.now().toString(36);
      setState(s=>{ s.ingredients[key]={name:"New ingredient",unit:"g",kcalPer:1,proteinPer:0,pricePer:0.001,pack:100,packPrice:1,packLabel:"100 g",group:"pantry"}; });
    });
  }

  if(route==="shopping"){
    const from=app.querySelector("#from"), to=app.querySelector("#to");
    if(from) from.addEventListener("change",e=>{ shopFrom=e.target.value; render(); });
    if(to) to.addEventListener("change",e=>{ shopTo=e.target.value; render(); });
    app.querySelectorAll("[data-range]").forEach(el=>el.addEventListener("click",e=>{
      const r=e.target.dataset.range; const start=todayISO();
      if(r==="3"){ shopFrom=start; shopTo=addDaysISO(start,2); }
      else if(r==="7"){ shopFrom=start; shopTo=addDaysISO(start,6); }
      else { shopFrom=state.settings.startDate; shopTo=addDaysISO(state.settings.startDate,state.settings.planDays-1); }
      render();
    }));
    app.querySelectorAll("[data-cost]").forEach(el=>el.addEventListener("click",e=>{
      setState(s=>{ s.settings.shoppingByPack = e.target.dataset.cost==="pack"; });
    }));
    const cp=app.querySelector("#copyList");
    if(cp) cp.addEventListener("click",()=>copyShopping());
    const pr=app.querySelector("#printList");
    if(pr) pr.addEventListener("click",()=>window.print());
    // loot check-off: ephemeral strike-through; ignore clicks on the "got it" button
    app.querySelectorAll("[data-loot]").forEach(el=>{
      el.addEventListener("click",e=>{ if(e.target.closest("[data-bought]")) return; el.classList.toggle("is-checked"); });
    });
    // "✓ got it" → add the bought packs (in units) to stock
    app.querySelectorAll("[data-bought]").forEach(el=>el.addEventListener("click",e=>{
      e.stopPropagation();
      const k=e.target.dataset.bought; const g=ing(k);
      const line=lineFor(k, accumulate(shopFrom,shopTo).totals[k]||0, state.settings.shoppingByPack);
      setState(s=>{ s.stock[k]=(s.stock[k]||0)+line.packs*g.pack; });
    }));
    // stock inputs
    app.querySelectorAll("[data-stock]").forEach(el=>el.addEventListener("change",e=>{
      const k=e.target.dataset.stock; const v=num(e.target.value,0);
      setState(s=>{ if(v<=0) delete s.stock[k]; else s.stock[k]=v; });
    }));
    app.querySelector("#clearStock")?.addEventListener("click",()=>{
      if(confirm("Clear all in-stock amounts?")) setState(s=>{ s.stock={}; });
    });
  }

  if(route==="tracker"){
    app.querySelectorAll("[data-cycle]").forEach(el=>el.addEventListener("change",e=>{
      const c=+e.target.dataset.cycle;
      setState(s=>{ s.checks.cycles[c]=e.target.checked; });
    }));
  }

  if(route==="settings"){
    app.querySelectorAll("[data-set]").forEach(el=>el.addEventListener("change",e=>{
      const f=e.target.dataset.set, v=e.target.value;
      setState(s=>{
        if(f==="startDate") s.settings.startDate=v||s.settings.startDate;
        else if(f==="kcalMin") s.settings.kcalTarget[0]=num(v,3000);
        else if(f==="kcalMax") s.settings.kcalTarget[1]=num(v,3200);
        else if(f==="planDays"||f==="proteinTarget"||f==="budgetCap") s.settings[f]=Math.round(num(v,s.settings[f]));
        else s.settings[f]=num(v,s.settings[f]);
      });
    }));
    app.querySelector("#exportJson").addEventListener("click",exportJson);
    app.querySelector("#importBtn").addEventListener("click",()=>app.querySelector("#importFile").click());
    app.querySelector("#importFile").addEventListener("change",importJson);
    app.querySelector("#resetAll").addEventListener("click",()=>{ if(confirm("Reset everything to the seed plan? This can't be undone.")) resetState(); });
  }
}

/* ---- Export / Import / Copy ---------------------------------------------- */
function exportJson(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=url; a.download="mwg-backup.json"; a.click(); URL.revokeObjectURL(url);
}
function importJson(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const data=migrate(JSON.parse(reader.result));
      if(!data.ingredients||!data.recipes) throw new Error("bad file");
      state=data; state.game.xp=totalXp(state); persist(); render();
      alert("Imported ✓");
    }catch(err){ alert("Import failed: "+err.message); }
  };
  reader.readAsText(file);
}
function copyShopping(){
  const list=shoppingList(shopFrom,shopTo);
  const line=l=>`- ${l.name}: ${l.packStr} (${fmtEUR(l.cost)})`;
  const toBuy=arr=>arr.filter(l=>l.packs>0);
  const txt=[`Supply run · ${shopFrom} – ${shopTo} · ${list.days} days (to buy, net of stock)`,"",
    "🛒 FRESH", ...toBuy(list.fresh).map(line), "",
    "🫙 PANTRY", ...toBuy(list.pantry).map(line), "",
    `💧 Water: ${list.water.liters} L (${fmtEUR(list.water.cost)})`, "",
    `TOTAL: ${fmtEUR(list.total)} (cap ${fmtEUR(state.settings.budgetCap)})`].join("\n");
  if(navigator.clipboard){ navigator.clipboard.writeText(txt).then(()=>alert("Shopping list copied ✓"),()=>fallbackCopy(txt)); }
  else fallbackCopy(txt);
}
function fallbackCopy(txt){
  const ta=document.createElement("textarea"); ta.value=txt; document.body.appendChild(ta);
  ta.select(); try{document.execCommand("copy");alert("Copied ✓");}catch(e){alert("Copy failed");} ta.remove();
}

/* ---- BOOT ---------------------------------------------------------------- */
window.addEventListener("hashchange",()=>{ if(currentRoute()==="today") viewDate=todayISO(); render(); });
render();
</script>
